name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  hardhat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Check JavaScript syntax
        run: npm run lint:js

      - name: Check roadmap guardrails
        run: npm run roadmap:check

      - name: Run tests
        run: npm test

      - name: Run Solidity coverage
        run: npm run coverage

      - name: Audit prompt fixtures
        run: python eval_engine/tools/audit_prompt_integrity.py

      - name: Production dependency audit
        run: npm run audit:prod
