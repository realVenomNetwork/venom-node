name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hardhat:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Check JavaScript syntax
        run: npm run lint:js

      - name: Check roadmap guardrails
        run: npm run roadmap:check

      - name: Run tests
        run: npm test

      - name: Run pilot tests
        run: npm run test:pilot

      - name: Run CIST tests
        run: npm run test:cist

      - name: Run Solidity coverage
        run: npm run coverage

      - name: Audit prompt fixtures
        run: python eval_engine/tools/audit_prompt_integrity.py

      - name: Production dependency audit
        run: npm run audit:prod
