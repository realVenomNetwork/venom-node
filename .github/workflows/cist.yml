name: CIST Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cist-fixture:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check roadmap guardrails
        run: npm run roadmap:check

      - name: Run unit test suite
        run: npm test

      - name: Run CIST unit tests
        run: npm run test:cist

      - name: Run CIST fixture smoke test
        run: npm run pilot:smoke-test -- --json --with-fixture-clients
        env:
          CI: true

      - name: Require PASS CIST result
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const root = path.resolve('tmp/smoke-test');
          if (!fs.existsSync(root)) {
            console.error('No CIST report directory found.');
            process.exit(1);
          }
          const reports = fs.readdirSync(root)
            .map((name) => path.join(root, name, 'report.json'))
            .filter((file) => fs.existsSync(file))
            .sort((a, b) => fs.statSync(b).mtimeMs - fs.statSync(a).mtimeMs);
          if (!reports.length) {
            console.error('No CIST report.json found.');
            process.exit(1);
          }
          const report = JSON.parse(fs.readFileSync(reports[0], 'utf8'));
          if (report.result !== 'PASS') {
            console.error(`CIST result was ${report.result}; expected PASS.`);
            process.exit(1);
          }
          console.log(`CIST result PASS: ${reports[0]}`);
          NODE

      - name: Sweep CIST artifacts for redaction
        id: redaction_sweep
        if: always()
        run: |
          node -e "const fs=require('node:fs');const path=require('node:path');const { assertContentIsSafe }=require('./scripts/pilot/cist/redaction');const root=path.resolve('tmp/smoke-test');if(!fs.existsSync(root)){process.exit(0);}const walk=(dir)=>{for(const entry of fs.readdirSync(dir,{withFileTypes:true})){const full=path.join(dir,entry.name);if(entry.isDirectory()){walk(full);continue;}if(entry.isFile()){assertContentIsSafe(fs.readFileSync(full,'utf8'),{source:full});}}};walk(root);"

      - name: Upload CIST artifacts
        if: always() && steps.redaction_sweep.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cist-report-${{ github.run_number }}
          path: tmp/smoke-test/
          retention-days: 7
          if-no-files-found: warn
