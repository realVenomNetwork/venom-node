services:
  redis:
    image: redis:7-alpine
    container_name: venom-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: venom-ml-service
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - TF_ENABLE_ONEDNN_OPTS=0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  venom-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venom-node
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ML_SERVICE_URL=http://ml-service:8000/evaluate
    depends_on:
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    restart: unless-stopped
    command: ["node", "register_and_start.js"]

volumes:
  redis_data:
