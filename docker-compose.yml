services:
  redis:
    image: redis:7-alpine
    container_name: venom-redis
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - DASHBOARD_REDIS_PASSWORD=venom_dash_dev_password
    volumes:
      - redis_data:/data
    command:
      - sh
      - -c
      - |
        cat > /tmp/users.acl <<EOF
        user default on nopass ~* &* +@all
        user venom_dash on >venom_dash_dev_password ~* &* -@all +ping +info +client +get +mget +scan +ttl +type +subscribe +psubscribe +unsubscribe +punsubscribe
        EOF
        redis-server --appendonly yes --aclfile /tmp/users.acl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: venom-ml-service
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - TF_ENABLE_ONEDNN_OPTS=0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  venom-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venom-node
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - VENOM_RUNTIME_MODE=testnet
      - USE_TEST_PAYLOAD=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ML_SERVICE_URL=http://ml-service:8000/evaluate
    depends_on:
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    restart: unless-stopped
    command: ["node", "register_and_start.js"]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venom-dashboard
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - VENOM_RUNTIME_MODE=testnet
      - USE_TEST_PAYLOAD=false
      - DASHBOARD_HOST=127.0.0.1
      - DASHBOARD_PORT=8787
      - DASHBOARD_REDIS_HOST=redis
      - DASHBOARD_REDIS_PORT=6379
      - DASHBOARD_REDIS_USERNAME=venom_dash
      - DASHBOARD_REDIS_PASSWORD=venom_dash_dev_password
    ports:
      - "127.0.0.1:8787:8787"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["node", "dashboard/server.js"]

volumes:
  redis_data:
